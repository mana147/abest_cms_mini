<!-- header.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Header - IELTS Abest</title>
    <!-- Google Fonts & Bootstrap 5 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="header.css">
</head>
<body>
    <!-- ===== HEADER START ===== -->
    <header class="fixed-top bg-white bg-opacity-90 backdrop-blur-sm border-bottom border-light">
        <div class="container py-3 d-flex align-items-center justify-content-between">
            <!-- Left: Logo + Menu -->
            <div class="d-flex align-items-center gap-3">
                <!-- Logo -->
                <a href="#" class="text-decoration-none d-flex align-items-center">
                    <img src="../../access/image/hompage/logo.png" class="logo-header" alt="IELTS Abest Logo" />
                </a>
                
                <!-- Mobile Toggle Button -->
                <button class="btn btn-outline-secondary d-lg-none p-2" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mobileMenu" aria-controls="mobileMenu" aria-expanded="false" aria-label="Mở menu">
                    <i class="fas fa-bars"></i>
                </button>

                <!-- Desktop Navigation -->
                <ul class="nav d-none d-lg-flex gap-4 fw-semibold small text-secondary mb-0">
                    <li class="nav-item">
                        <a href="#" class="nav-link px-0 text-secondary hover-telos">Trang chủ</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle px-0 text-secondary" href="#" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            Khóa học
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">IELTS Speaking</a></li>
                            <li><a class="dropdown-item" href="#">IELTS Writing</a></li>
                            <li><a class="dropdown-item" href="#">IELTS Reading</a></li>
                            <li><a class="dropdown-item" href="#">IELTS Listening</a></li>
                            <li><hr class="dropdown-divider" /></li>
                            <li><a class="dropdown-item" href="#">Band 7.0+ Prep</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link px-0 text-secondary hover-telos">Lộ trình</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link px-0 text-secondary hover-telos">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link px-0 text-secondary hover-telos">Liên hệ</a>
                    </li>
                    <li class="nav-item">
                        <a href="../../page/homepage/homepage.html#registerTest" class="nav-link px-0 text-danger">Đăng ký Test</a>
                    </li>
                </ul>
            </div>

            <!-- Right: CTA Button -->
            <div class="d-flex align-items-center gap-3">
                <a href="#" class="btn btn-telos-purple rounded-3 fw-bold px-4 py-2 small">Đăng ký tư vấn</a>
            </div>
        </div>

        <!-- ===== MOBILE MENU ===== -->
        <div class="collapse d-lg-none w-100 mobile-menu-wrap" id="mobileMenu">
            <ul class="nav flex-column gap-2 px-3 pb-3 mobile-menu-collapse">
                <li class="nav-item"><a href="#" class="nav-link text-secondary">Trang chủ</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-secondary">Về chúng tôi</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-secondary">Khóa học</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-secondary">Blog</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-secondary">Liên hệ</a></li>
                <li class="nav-item"><a href="../../page/homepage/homepage.html#registerTest" class="nav-link text-danger">Đăng ký Test</a></li>
            </ul>
        </div>
    </header>
    <!-- ===== HEADER END ===== -->

    <!-- Bootstrap JS (required for dropdown, collapse, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="header.js"></script>
</body>
</html>
